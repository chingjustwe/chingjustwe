<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>程序员写代码 - SVG 动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 800px;
    height: 600px;
  }

  /* 背景代码雨 */
  .code-rain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
  }

  .code-line {
    position: absolute;
    color: #58a6ff;
    font-size: 13px;
    white-space: nowrap;
    animation: codeScroll linear infinite;
  }

  @keyframes codeScroll {
    0%   { transform: translateY(-100%); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* 主 SVG */
  svg { width: 100%; height: 100%; }

  /* === 头部转动 === */
  @keyframes headTurn {
    0%, 100% { transform: rotate(0deg); }
    25%  { transform: rotate(-3deg); }
    75%  { transform: rotate(3deg); }
  }

  /* === 眨眼 === */
  @keyframes blink {
    0%, 90%, 96%, 100% { transform: scaleY(1); }
    93% { transform: scaleY(0.05); }
  }

  @keyframes blinkLeft {
    0%, 88%, 94%, 100% { transform: scaleY(1); }
    91% { transform: scaleY(0.05); }
  }

  @keyframes blinkRight {
    0%, 92%, 98%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.05); }
  }

  /* === 左手打字 === */
  @keyframes leftHandTyping {
    0%, 100% { transform: translateX(0px) translateY(0px); }
    30%  { transform: translateX(-6px) translateY(-2px); }
    60%  { transform: translateX(4px) translateY(1px); }
    80%  { transform: translateX(-3px) translateY(-1px); }
  }

  /* === 右手打字 === */
  @keyframes rightHandTyping {
    0%, 100% { transform: translateX(0px) translateY(0px); }
    25%  { transform: translateX(5px) translateY(-1px); }
    55%  { transform: translateX(-4px) translateY(2px); }
    75%  { transform: translateX(6px) translateY(-2px); }
  }

  /* === 手指敲击 === */
  @keyframes fingerTap {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  @keyframes fingerTap2 {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
  }

  /* === 身体轻微晃动 === */
  @keyframes bodySway {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(0.5deg); }
  }

  /* === 屏幕闪烁 === */
  @keyframes screenFlicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.97; }
  }

  /* === 代码光标 === */
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* === 耳机线微动 === */
  @keyframes cableSway {
    0%, 100% { d: path("M 265 160 Q 260 190 255 220"); }
    50% { d: path("M 265 160 Q 262 190 258 220"); }
  }

  /* 应用动画 */
  .head-group {
    animation: headTurn 6s ease-in-out infinite;
    transform-origin: 280px 180px;
  }

  .body-group {
    animation: bodySway 4s ease-in-out infinite;
    transform-origin: 280px 300px;
  }

  .eye-left, .eye-right {
    transform-origin: center;
  }
  .eye-left  { animation: blink 4s ease-in-out infinite; }
  .eye-right { animation: blink 4s ease-in-out 0.15s infinite; }

  .left-hand  { animation: leftHandTyping 1.2s ease-in-out infinite; }
  .right-hand { animation: rightHandTyping 1.0s ease-in-out infinite; }

  .finger-l1 { animation: fingerTap 0.8s ease-in-out infinite; }
  .finger-l2 { animation: fingerTap2 0.7s ease-in-out 0.1s infinite; }
  .finger-l3 { animation: fingerTap 0.9s ease-in-out 0.2s infinite; }
  .finger-l4 { animation: fingerTap2 0.75s ease-in-out 0.3s infinite; }

  .finger-r1 { animation: fingerTap 0.85s ease-in-out 0.05s infinite; }
  .finger-r2 { animation: fingerTap2 0.7s ease-in-out 0.15s infinite; }
  .finger-r3 { animation: fingerTap 0.8s ease-in-out 0.25s infinite; }
  .finger-r4 { animation: fingerTap2 0.9s ease-in-out 0.35s infinite; }

  .screen-glow { animation: screenFlicker 3s ease-in-out infinite; }
  .cursor     { animation: cursorBlink 0.8s step-end infinite; }

  /* 底部信息 */
  .info {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="container">
  <!-- 背景代码雨 -->
  <div class="code-rain" id="codeRain"></div>

  <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 屏幕发光渐变 -->
      <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1a2332"/>
        <stop offset="50%" stop-color="#0d1b2a"/>
        <stop offset="100%" stop-color="#1b2838"/>
      </linearGradient>

      <!-- 桌面渐变 -->
      <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3d2b1f"/>
        <stop offset="100%" stop-color="#2a1f16"/>
      </linearGradient>

      <!-- 耳机渐变 -->
      <linearGradient id="headphoneGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2c2c2c"/>
        <stop offset="100%" stop-color="#1a1a1a"/>
      </linearGradient>

      <!-- 皮肤色 -->
      <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f5d5b8"/>
        <stop offset="100%" stop-color="#e8c4a0"/>
      </linearGradient>

      <filter id="screenGlow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="shadow">
        <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
      </filter>
    </defs>

    <!-- ===== 背景 ===== -->
    <rect width="800" height="600" fill="#0d1117"/>
    <!-- 墙壁 -->
    <rect x="0" y="0" width="800" height="420" fill="#161b22" rx="0"/>
    <!-- 地面 -->
    <rect x="0" y="420" width="800" height="180" fill="#0d1117"/>

    <!-- ===== 桌面 ===== -->
    <rect x="80" y="380" width="640" height="20" rx="4" fill="url(#deskGrad)" filter="url(#shadow)"/>
    <!-- 桌腿 -->
    <rect x="120" y="400" width="16" height="160" rx="2" fill="#2a1f16"/>
    <rect x="664" y="400" width="16" height="160" rx="2" fill="#2a1f16"/>

    <!-- ===== 显示器 ===== -->
    <g filter="url(#shadow)">
      <!-- 底座 -->
      <rect x="340" y="370" width="120" height="12" rx="3" fill="#1a1a1a"/>
      <!-- 支架 -->
      <rect x="385" y="210" width="30" height="160" rx="5" fill="#1a1a1a"/>
      <!-- 屏幕边框 -->
      <rect x="280" y="98" width="240" height="155" rx="8" fill="#111111"/>
      <!-- 屏幕 -->
      <rect x="290" y="108" width="220" height="130" rx="4" fill="url(#screenGrad)" class="screen-glow"/>
      <!-- 屏幕上的代码行 -->
      <rect x="300" y="118" width="80" height="3" rx="1.5" fill="#58a6ff" opacity="0.8"/>
      <rect x="300" y="128" width="120" height="3" rx="1.5" fill="#79c0ff" opacity="0.7"/>
      <rect x="310" y="138" width="60" height="3" rx="1.5" fill="#7ee787" opacity="0.6"/>
      <rect x="300" y="148" width="100" height="3" rx="1.5" fill="#d2a8ff" opacity="0.7"/>
      <rect x="310" y="158" width="45" height="3" rx="1.5" fill="#ffa657" opacity="0.6"/>
      <rect x="300" y="168" width="90" height="3" rx="1.5" fill="#58a6ff" opacity="0.7"/>
      <rect x="310" y="178" width="70" height="3" rx="1.5" fill="#79c0ff" opacity="0.5"/>
      <rect x="300" y="188" width="110" height="3" rx="1.5" fill="#7ee787" opacity="0.6"/>
      <rect x="310" y="198" width="55" height="3" rx="1.5" fill="#d2a8ff" opacity="0.7"/>
      <!-- 光标 -->
      <rect x="390" y="188" width="8" height="3" rx="1.5" fill="#58a6ff" class="cursor" opacity="0.9"/>
      <!-- 屏幕 logo -->
      <rect x="395" y="108" width="6" height="6" rx="1" fill="#30363d" opacity="0.5"/>
    </g>

    <!-- ===== 键盘 ===== -->
    <g filter="url(#shadow)">
      <rect x="310" y="350" width="180" height="20" rx="4" fill="#1a1a1a"/>
      <!-- 键盘按键行 -->
      <g fill="#2d2d2d" opacity="0.8">
        <rect x="318" y="354" width="8" height="4" rx="1"/>
        <rect x="328" y="354" width="8" height="4" rx="1"/>
        <rect x="338" y="354" width="8" height="4" rx="1"/>
        <rect x="348" y="354" width="8" height="4" rx="1"/>
        <rect x="358" y="354" width="8" height="4" rx="1"/>
        <rect x="368" y="354" width="8" height="4" rx="1"/>
        <rect x="378" y="354" width="8" height="4" rx="1"/>
        <rect x="388" y="354" width="8" height="4" rx="1"/>
        <rect x="398" y="354" width="8" height="4" rx="1"/>
        <rect x="408" y="354" width="8" height="4" rx="1"/>
        <rect x="418" y="354" width="8" height="4" rx="1"/>
        <rect x="428" y="354" width="8" height="4" rx="1"/>
        <rect x="438" y="354" width="8" height="4" rx="1"/>
        <rect x="448" y="354" width="8" height="4" rx="1"/>
        <rect x="458" y="354" width="8" height="4" rx="1"/>
        <rect x="468" y="354" width="8" height="4" rx="1"/>
        <!-- 第二行 -->
        <rect x="322" y="360" width="8" height="4" rx="1"/>
        <rect x="332" y="360" width="8" height="4" rx="1"/>
        <rect x="342" y="360" width="8" height="4" rx="1"/>
        <rect x="352" y="360" width="8" height="4" rx="1"/>
        <rect x="362" y="360" width="8" height="4" rx="1"/>
        <rect x="372" y="360" width="8" height="4" rx="1"/>
        <rect x="382" y="360" width="8" height="4" rx="1"/>
        <rect x="392" y="360" width="8" height="4" rx="1"/>
        <rect x="402" y="360" width="8" height="4" rx="1"/>
        <rect x="412" y="360" width="8" height="4" rx="1"/>
        <rect x="422" y="360" width="8" height="4" rx="1"/>
        <rect x="432" y="360" width="8" height="4" rx="1"/>
        <rect x="442" y="360" width="8" height="4" rx="1"/>
        <rect x="452" y="360" width="8" height="4" rx="1"/>
        <rect x="462" y="360" width="8" height="4" rx="1"/>
      </g>
    </g>

    <!-- ===== 人物主体 ===== -->
    <g class="body-group">
      <!-- === 身体（白色 T 恤） === -->
      <path d="M 230 270 L 215 370 Q 215 380 225 380 L 335 380 Q 345 380 345 370 L 330 270 Z"
            fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
      <!-- T恤领口 -->
      <path d="M 250 270 Q 280 295 310 270" fill="none" stroke="#ddd" stroke-width="2"/>
      <!-- T恤褶皱 -->
      <path d="M 260 310 Q 265 320 260 340" fill="none" stroke="#e8e8e8" stroke-width="1.5" opacity="0.6"/>
      <path d="M 300 310 Q 295 325 300 350" fill="none" stroke="#e8e8e8" stroke-width="1.5" opacity="0.6"/>

      <!-- === 左手臂 === -->
      <g class="left-hand">
        <path d="M 225 280 Q 190 310 200 355 Q 205 365 215 360 L 230 340 Q 235 330 230 310 Z"
              fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
        <!-- 左手 -->
        <ellipse cx="208" cy="360" rx="16" ry="12" fill="url(#skinGrad)" transform="rotate(-15 208 360)"/>
        <!-- 左手手指 -->
        <g class="finger-l1"><rect x="194" y="365" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-l2"><rect x="200" y="368" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-l3"><rect x="206" y="369" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-l4"><rect x="212" y="368" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
      </g>

      <!-- === 右手臂 === -->
      <g class="right-hand">
        <path d="M 335 280 Q 370 310 360 355 Q 355 365 345 360 L 330 340 Q 325 330 330 310 Z"
              fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
        <!-- 右手 -->
        <ellipse cx="352" cy="360" rx="16" ry="12" fill="url(#skinGrad)" transform="rotate(15 352 360)"/>
        <!-- 右手手指 -->
        <g class="finger-r1"><rect x="350" y="367" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-r2"><rect x="356" y="369" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-r3"><rect x="362" y="368" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
        <g class="finger-r4"><rect x="368" y="365" width="4" height="10" rx="2" fill="url(#skinGrad)"/></g>
      </g>
    </g>

    <!-- ===== 头部组（可转动） ===== -->
    <g class="head-group">
      <!-- === 脖子 === -->
      <rect x="265" y="248" width="30" height="25" rx="8" fill="url(#skinGrad)"/>

      <!-- === 头发（后层） === -->
      <ellipse cx="280" cy="175" rx="78" ry="85" fill="#1a1a1a"/>
      <!-- 头发侧面 -->
      <path d="M 202 175 Q 198 250 220 260 L 220 170 Z" fill="#1a1a1a"/>
      <path d="M 358 175 Q 362 250 340 260 L 340 170 Z" fill="#1a1a1a"/>

      <!-- === 脸部 === -->
      <ellipse cx="280" cy="195" rx="55" ry="65" fill="url(#skinGrad)"/>

      <!-- === 长刘海 === -->
      <path d="M 225 155 Q 230 130 250 125 Q 270 120 290 125 Q 310 130 335 155
               Q 320 145 310 148 Q 290 152 280 148 Q 260 145 245 150 Q 230 152 225 155 Z"
            fill="#1a1a1a"/>
      <!-- 刘海发丝 -->
      <path d="M 230 148 Q 245 135 260 140" fill="none" stroke="#252525" stroke-width="1.5"/>
      <path d="M 260 142 Q 275 130 290 138" fill="none" stroke="#252525" stroke-width="1.5"/>
      <path d="M 290 140 Q 305 132 320 145" fill="none" stroke="#252525" stroke-width="1.5"/>
      <!-- 刘海下垂 -->
      <path d="M 240 160 Q 255 175 268 165" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <path d="M 270 158 Q 280 178 292 165" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <path d="M 295 155 Q 305 172 318 160" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

      <!-- === 眉毛 === -->
      <path d="M 245 182 Q 255 177 265 179" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 295 179 Q 305 177 315 182" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

      <!-- === 黑框眼镜 === -->
      <g>
        <!-- 左镜框 -->
        <rect x="240" y="184" width="28" height="20" rx="5" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <!-- 右镜框 -->
        <rect x="292" y="184" width="28" height="20" rx="5" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <!-- 鼻梁 -->
        <path d="M 268 194 Q 280 188 292 194" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
        <!-- 镜腿 -->
        <path d="M 240 190 Q 225 185 222 175" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 320 190 Q 335 185 338 175" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 镜片反光 -->
        <rect x="242" y="186" width="8" height="14" rx="2" fill="white" opacity="0.08"/>
        <rect x="294" y="186" width="8" height="14" rx="2" fill="white" opacity="0.08"/>
      </g>

      <!-- === 眼睛（可眨） === -->
      <g class="eye-left">
        <ellipse cx="254" cy="194" rx="5" ry="5.5" fill="white"/>
        <ellipse cx="255" cy="194" rx="3" ry="3.5" fill="#2a1a0a"/>
        <ellipse cx="256" cy="192" rx="1.2" ry="1.2" fill="white"/>
      </g>
      <g class="eye-right">
        <ellipse cx="306" cy="194" rx="5" ry="5.5" fill="white"/>
        <ellipse cx="305" cy="194" rx="3" ry="3.5" fill="#2a1a0a"/>
        <ellipse cx="304" cy="192" rx="1.2" ry="1.2" fill="white"/>
      </g>

      <!-- === 鼻子 === -->
      <path d="M 280 198 Q 276 205 278 208" fill="none" stroke="#d4a87c" stroke-width="1.5" stroke-linecap="round"/>

      <!-- === 嘴（微笑） === -->
      <path d="M 268 218 Q 280 226 292 218" fill="none" stroke="#c4885a" stroke-width="2" stroke-linecap="round"/>

      <!-- === 头戴式耳机 === -->
      <g>
        <!-- 头梁 -->
        <path d="M 225 125 Q 220 100 240 90 Q 280 75 320 90 Q 340 100 335 125"
              fill="none" stroke="url(#headphoneGrad)" stroke-width="8" stroke-linecap="round"/>
        <!-- 头梁内衬 -->
        <path d="M 228 125 Q 224 103 242 93 Q 280 78 318 93 Q 336 103 332 125"
              fill="none" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
        <!-- 左耳罩 -->
        <ellipse cx="222" cy="155" rx="16" ry="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
        <ellipse cx="222" cy="155" rx="10" ry="14" fill="#252525"/>
        <!-- 左耳罩连接 -->
        <rect x="222" y="125" width="6" height="12" rx="2" fill="#1a1a1a"/>
        <!-- 右耳罩 -->
        <ellipse cx="338" cy="155" rx="16" ry="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
        <ellipse cx="338" cy="155" rx="10" ry="14" fill="#252525"/>
        <!-- 右耳罩连接 -->
        <rect x="332" y="125" width="6" height="12" rx="2" fill="#1a1a1a"/>
        <!-- 耳机线 -->
        <path d="M 265 160 Q 260 190 255 220" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- ===== 咖啡杯 ===== -->
    <g filter="url(#shadow)">
      <rect x="560" y="350" width="22" height="24" rx="3" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
      <!-- 杯把手 -->
      <path d="M 582 356 Q 592 356 592 362 Q 592 368 582 368" fill="none" stroke="#ccc" stroke-width="2.5"/>
      <!-- 热气 -->
      <path d="M 567 345 Q 570 338 567 330" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="d" dur="2s" repeatCount="indefinite"
          values="M 567 345 Q 570 338 567 330;M 567 345 Q 564 338 567 330;M 567 345 Q 570 338 567 330"/>
      </path>
      <path d="M 575 345 Q 578 336 575 328" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
          values="M 575 345 Q 578 336 575 328;M 575 345 Q 572 336 575 328;M 575 345 Q 578 336 575 328"/>
      </path>
    </g>

    <!-- ===== 环境光 ===== -->
    <circle cx="400" cy="108" r="100" fill="#58a6ff" opacity="0.03">
      <animate attributeName="opacity" dur="4s" values="0.03;0.05;0.03" repeatCount="indefinite"/>
    </circle>
  </svg>

  <div class="info">CODING IN PROGRESS...</div>
</div>

<script>
// 生成背景代码雨
const codeRain = document.getElementById('codeRain');
const codeSnippets = [
  'const', 'let', 'function', 'return', 'async', 'await',
  'import', 'export', 'class', 'extends', 'interface',
  'type', 'Promise', 'Array', 'Object', 'string', 'number',
  'map()', 'filter()', 'reduce()', 'forEach()',
  'useState', 'useEffect', 'useCallback',
  'git commit', 'npm install', 'docker build',
  'console.log', 'JSON.parse', 'fetch()',
  '...spread', '=> {}', '&&', '||', '??',
  'if ()', 'for ()', 'while ()', 'try {}',
  'def ', 'print()', 'lambda', 'import numpy',
  'SELECT *', 'INSERT INTO', 'UPDATE',
];

for (let i = 0; i < 40; i++) {
  const line = document.createElement('div');
  line.className = 'code-line';
  line.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
  line.style.left = Math.random() * 90 + '%';
  line.style.animationDuration = (Math.random() * 8 + 6) + 's';
  line.style.animationDelay = Math.random() * 8 + 's';
  line.style.fontSize = (Math.random() * 8 + 10) + 'px';
  line.style.opacity = Math.random() * 0.5 + 0.2;
  codeRain.appendChild(line);
}
</script>

</body>
</html>
