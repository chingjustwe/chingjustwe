  </style>
  <rect x="0" y="0" width="109" height="34" rx="17.0" fill="#1a313d" stroke="#347d94"/>
  <g transform="translate(13.0,9.5)">
    <g class="chip-anim" style="animation-delay:1.0s" color="#39d3ff">
      <svg width="15" height="15" viewBox="0 0 24 24" style="overflow:visible"><path d="M12 2c-4 0-7 3-7 7 0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.5" fill="currentColor"/></svg>
    </g>
  </g>
  <text class="chip-text" x="34.0" y="18.0">Hangzhou</text>
</svg>