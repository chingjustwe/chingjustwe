<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 34" width="128" height="34" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <style>
    .chip-text { fill: #e6edf3; font-size: 13px; dominant-baseline: central; }
