  </style>
  <rect x="0" y="0" width="128" height="34" rx="17.0" fill="#322531" stroke="#8d4e68"/>
  <g transform="translate(13.0,9.5)">
    <g class="chip-anim" style="animation-delay:1.25s" color="#ff6b9d">
      <svg width="15" height="15" viewBox="0 0 24 24" style="overflow:visible"><rect x="3" y="8" width="18" height="9" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 12h3M8.5 10.5v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="11.5" r="1.1" fill="currentColor"/><circle cx="18" cy="13.5" r="1.1" fill="currentColor"/></svg>
    </g>
  </g>
  <text class="chip-text" x="34.0" y="18.0">Video Games</text>
</svg>