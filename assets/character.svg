<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" shape-rendering="crispEdges">
  <style>
    .screen-flicker { animation: flicker 2.4s infinite; }
    @keyframes flicker { 0%,97%,100%{opacity:1} 98%{opacity:.4} 99%{opacity:.8} }
    .blink { transform-box: fill-box; transform-origin: center; animation: blink 3.5s infinite; }
    @keyframes blink { 0%,92%,100%{transform:scaleY(1)} 95%{transform:scaleY(.1)} }
    .typing-l { transform-box: fill-box; transform-origin: bottom right; animation: typeL .3s infinite alternate; }
    .typing-r { transform-box: fill-box; transform-origin: bottom left; animation: typeR .25s infinite alternate; }
    @keyframes typeL { 0%{transform:rotate(0)} 100%{transform:rotate(-5deg)} }
    @keyframes typeR { 0%{transform:rotate(0)} 100%{transform:rotate(5deg)} }
    .head-bob { transform-box: fill-box; transform-origin: bottom center; animation: headBob 4s ease-in-out infinite; }
    @keyframes headBob { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-1.5deg)} 75%{transform:rotate(1.5deg)} }
    .cursor-blink { animation: cblink 1s step-end infinite; }
    @keyframes cblink { 50%{opacity:0} }
    .steam { transform-box: fill-box; transform-origin: bottom center; animation: steamRise 2.5s ease-in-out infinite; }
    @keyframes steamRise { 0%,100%{opacity:.3; transform:translateY(0) scaleY(1)} 50%{opacity:.6; transform:translateY(-3px) scaleY(1.2)} }
    .glow { animation: glowPulse 2.5s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
    .char-shadow { filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
    @media (prefers-reduced-motion: reduce) {
      .screen-flicker,.blink,.typing-l,.typing-r,.head-bob,.cursor-blink,.steam,.glow { animation: none !important; }
    }
  </style>
